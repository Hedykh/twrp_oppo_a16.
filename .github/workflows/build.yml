name: TWRP Build Oppo A16
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Prepare Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev python3-pip adb
        sudo apt-get clean

    - name: Set up Minimal TWRP
      run: |
        mkdir ~/twrp
        cd ~/twrp
        git config --global user.email "heedikh3@gmail.com"
        git config --global user.name "Hedykh"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11
        repo sync -j$(nproc --all)

    - name: Clone Device Tree
      run: |
        mkdir -p ~/twrp/device/oppo/OP4F77
        cp -r $GITHUB_WORKSPACE/* ~/twrp/device/oppo/OP4F77/

    - name: Build Recovery
      run: |
        cd ~/twrp
        source build/envsetup.sh
        lunch twrp_OP4F77-eng
        make recoveryimage -j$(nproc --all)

    - name: Upload TWRP
      uses: actions/upload-artifact@v2
      with:
        name: TWRP_OppoA16_Image
        path: ~/twrp/out/target/product/OP4F77/recovery.img
